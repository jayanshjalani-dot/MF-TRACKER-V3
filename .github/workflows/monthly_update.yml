name: Monthly MF Data Refresh

on:
  schedule:
    # Run at 03:00 UTC on the 8th of every month (factsheets are usually out by then)
    - cron: '0 3 8 * *'
  workflow_dispatch:    # allow manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated DB back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monthly refresh
        run: python scripts/monthly_update.py

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mf_tracker.db
          git diff --cached --quiet || git commit -m "chore: monthly data refresh $(date +'%Y-%m')"
          git push
